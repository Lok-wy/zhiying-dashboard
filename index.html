/* kimi-host-safe-zone */
:root {

  --daimon-widget-host-safe-block-start: 44px;

  --kimi-color-surface: #fffdf8;
  --kimi-color-surface-muted: #faf6ee;
  --kimi-color-border: #e8e0d2;

  --kimi-color-danger: #c14b3a;
  /* 全局暖色系(与美大运维一致):金棕主色/柔和绿/暖黑文字 */
  --kimi-color-accent: #b08a3e;
  --kimi-color-on-accent: #ffffff;
  --kimi-color-success: #5d8a5a;
  --kimi-color-positive: #5d8a5a;
  --kimi-color-text-primary: #3d352c;
  --kimi-color-text-secondary: #7a6f5f;
  --kimi-color-text-tertiary: #b9b0a0;
  --kimi-color-text-quaternary: #b9b0a0;

.kimi-host-safe-context { container-type: inline-size; }
.kimi-host-safe-header {
  box-sizing: border-box;
  min-block-size: var(--daimon-widget-host-safe-block-start, 44px);
  padding-inline-end: var(--daimon-widget-host-safe-inline-end, 190px);
}
@container (max-width: 419px) {
  .kimi-host-safe-header {
    min-block-size: 0;

    padding-inline-end: 0;

}

[data-kimi-root] { box-sizing: border-box; inline-size: 100%; min-inline-size: 0; max-inline-size: 100%; overflow: visible; }

html[data-daimon-size-tier="compact"] [data-kimi-priority="p1"],
html[data-daimon-size-tier="compact"] [data-kimi-priority="p2"],

.p1-line output.rate.neg { color: var(--kimi-color-danger, #d1242f); }

.loss-panel { margin-top: 14px; border: 1px solid color-mix(in srgb, var(--kimi-color-danger, #d1242f) 22%, var(--kimi-color-border)); border-radius: 10px; padding: 12px 16px; background: color-mix(in srgb, var(--kimi-color-danger, #d1242f) 3%, var(--kimi-color-surface)); }

table { border-collapse: collapse; inline-size: 100%; font-size: 12.5px; font-variant-numeric: tabular-nums; table-layout: fixed; }
thead th {
  background: var(--kimi-color-surface-muted);
  font-size: 12px; font-weight: 600; color: #7a6f5f;
  text-align: end; padding: 6px 4px; border-block-end: 1px solid var(--kimi-color-border);
  cursor: pointer; user-select: none; white-space: normal; overflow-wrap: break-word;
}
thead th:first-child, tbody td:first-child { text-align: start; }
thead th:first-child { inline-size: 21%; padding-inline-start: 10px; }
tbody td:first-child { padding-inline-start: 10px; }
thead th:last-child, tbody td:last-child { padding-inline-end: 10px; }
thead th.sorted { color: var(--kimi-color-accent); }
thead th:focus-visible { outline: 2px solid var(--kimi-color-accent); outline-offset: -2px; }
tbody td { padding: 4px; text-align: end; vertical-align: middle; border-block-end: 1px solid color-mix(in srgb, var(--kimi-color-border) 45%, transparent); white-space: nowrap; }
tbody tr:last-child td { border-block-end: 0; }
tbody tr:nth-child(even) td { background: color-mix(in srgb, var(--kimi-color-surface-muted) 40%, transparent); }
tbody tr:hover td { background: var(--kimi-color-surface-muted); }
tbody tr.risk td:first-child { box-shadow: inset 2px 0 0 var(--kimi-color-danger, #d1242f); }
/* 预警整行淡红底(与美大差评行 row-bad 一致):even/odd 双写以压过斑马纹 */
tbody tr.risk:nth-child(even) td, tbody tr.risk:nth-child(odd) td { background: #fbecea; }
tbody tr.risk:hover td { background: #f7e4de; }
tbody td:first-child { white-space: normal; overflow-wrap: break-word; }
.cell-name { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; white-space: normal; justify-content: center; }
.cell-name .nm { color: var(--kimi-color-text-primary); font-weight: 600; }
.cell-name .rg { font-size: 11px; color: #7a6f5f; }
td .neg { color: var(--kimi-color-danger, #d1242f); }
td .pos { color: var(--kimi-color-positive, var(--kimi-color-success, #1a7f37)); }
td .bad { color: var(--kimi-color-danger, #d1242f); }
td .warn-dot { color: var(--kimi-color-danger, #d1242f); font-size: 11px; }
td .muted { color: var(--kimi-color-text-quaternary); }

/* footer */
.ft { margin-top: 14px; padding-block-start: 10px; border-block-start: 1px solid color-mix(in srgb, var(--kimi-color-border) 55%, transparent); font-size: 11px; color: var(--kimi-color-text-quaternary); line-height: 1.6; }

/* regular tier: P0+P1 only */
html[data-daimon-size-tier="regular"] [data-kimi-priority="p2"],
html[data-daimon-size-tier="regular"] [data-kimi-priority="p3"] { display: none !important; }

/* compact composition */
html[data-daimon-size-tier="compact"] .summary { margin-top: 0; gap: 12px; }
html[data-daimon-size-tier="compact"] .p0 output { font-size: 26px; }
html[data-daimon-size-tier="compact"] .hd .meta { display: none; }

/* narrow stacking */
@container (max-width: 719px) {
  .p1-card { border-inline-start: 0; padding-inline-start: 0; }
}
@media (prefers-reduced-motion: reduce) {
  [data-kimi-root] * { scroll-behavior: auto; }
}
</style>
</head>
<body><div style="display:flex;gap:12px;align-items:center;padding:12px 18px;background:#fffdf8;border-bottom:1px solid #e8e0d2;font-size:16px;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;"><a href="index.html" style="color:#8f6c2c;font-weight:700;text-decoration:none;padding:8px 22px;border:1.5px solid #b08a3e;border-radius:9px;background:#faf6ee;">直营日报</a><a href="meida.html" style="color:#7a6f5f;text-decoration:none;padding:8px 22px;border:1.5px solid #e8e0d2;border-radius:9px;">美大运维</a><span style="margin-left:auto;color:#b3b8c0;font-size:12px;">数据 2026-07-23 · 更新 07-24 08:51</span></div>
<main class="widget kimi-host-safe-context kimi-construction-grid" data-kimi-root>
  <header class="hd kimi-host-safe-header" data-kimi-priority="p3">
    <h1>直营门店经营日报</h1>
    <span class="bizdate" data-f="bizdate"></span>
    <span class="hd-right">
      <span class="meta" data-f="meta"></span>
      
      <button type="button" class="dl-btn" data-f="dlBtn">下载 Excel</button>
    </span>
  </header>

  <section class="summary" aria-label="全国汇总">
    <div class="p0" data-kimi-priority="p0" role="group" aria-label="昨日全国完成">
      <div class="pair">
        <span class="cap">昨日完成（万元）</span>
        <output data-f="yRev">—</output>
        <span class="sub" data-f="yTgt"></span>
      </div>
      <div class="pair">
        <span class="cap">完成率</span>
        <output class="rate" data-f="yRate">—</output>
        <span class="sub" data-f="yStores"></span>
      </div>
    </div>
    <div class="p1-card" data-kimi-priority="p1">
      <div class="p1-line">
        <span class="cap">月累计（万元）</span>
        <output data-f="mRev">—</output>
        <span class="sub" data-f="mTgt"></span>
      </div>
      <div class="p1-line">
        <span class="cap">月度完成率</span>
        <output class="rate" data-f="mRate">—</output>
        <span class="sub" data-f="pTime"></span>
      </div>
    </div>
  </section>

  <section class="loss-panel" data-kimi-priority="p2" aria-label="预计亏损门店">
    <div class="lp-hd">
      <h2>预计亏损门店</h2>
      <span class="lp-sum" data-f="lossSum"></span>
    </div>
    <div class="lp-grid" data-f="lossGrid"></div>
  </section>

  <section class="tbl-sec" data-kimi-priority="p2" aria-label="门店明细">
    <div class="sec-hd">
      <h2>门店明细</h2>
    </div>
    <div class="tbl-tools">
      <div class="seg" data-f="segDone" role="group" aria-label="按当日完成情况筛选">
        <button type="button" data-v="undone"></button>
        <button type="button" data-v="done"></button>
        <button type="button" data-v="all"></button>
      </div>
      <select data-f="regionSel" aria-label="按区域筛选"><option value="">全部区域</option></select>
      <input data-f="searchInput" type="search" placeholder="搜索门店 / 编码" aria-label="搜索门店">
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr data-f="theadRow"></tr></thead>
        <tbody data-f="tbody"></tbody>
      </table>
    </div>
    <div class="tbl-note" data-f="tblNote"></div>
  </section>

  <footer class="ft" data-kimi-priority="p3" data-f="footer"></footer>
</main>

<script>
(function () {
  "use strict";

  var SAMPLE = {
    date: "2026-07-19", month: "2026-07", updatedAt: "示例数据", daysElapsed: 19, daysInMonth: 31,
    totals: { yesterdayRevenue: 680000, yesterdayTarget: 690000, yesterdayRate: 98.6,
              mtdRevenue: 18000000, mtdTarget: 18300000, mtdRate: 98.4, monthBudget: 28210000, progress: 63.8 },
    stores: [], regions: [], lossStores: [], isSample: true
  };

  var COLS = [
    { key: "name",            label: "门店",       num: false },
    { key: "yesterdayRevenue",label: "昨日(万)",   num: true },
    { key: "yesterdayTarget", label: "昨日指标(万)", num: true },
    { key: "yesterdayRate",   label: "日完成率",   num: true },
    { key: "mtdRevenue",      label: "月营收", num: true },
    { key: "mtdRate",         label: "月完成率",   num: true },
    { key: "wowSameDay",      label: "环比上周同日", num: true },
    { key: "wowBatchSameDay", label: "环比上周同日批次", num: true },
    { key: "wowPerBatchSameDay", label: "环比上周同日批单", num: true },
    { key: "wowWeek",         label: "周环比",     num: true },
    { key: "breakEven",       label: "平衡点(万)", num: true },
    { key: "forecastProfit",  label: "预计利润(万)", num: true },
    { key: "profitDiff",      label: "利润指标对比(万)", num: true },
    { key: "lossRisk",        label: "预警",       num: false }
  ];

  var state = { sortKey: "yesterdayRate", sortAsc: true, region: "", q: "", doneFilter: "undone" };
  var current = null;

  function $(sel) { return document.querySelector(sel); }
  function fmtWan(v) { if (v == null) return "—"; var w = v / 10000; return w.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  /* K009 总部店不在看板展示（汇总口径本就不含它） */
  function notHQ(s) { return String(s.code || "").toUpperCase() !== "K009"; }
  function fmtPct(v) { return v == null ? "—" : v.toFixed(1) + "%"; }
  function fmtWow(v) { if (v == null) return '<span class="muted">—</span>'; var cls = v < 0 ? "neg" : "pos"; return '<span class="' + cls + '">' + (v > 0 ? "+" : "") + v.toFixed(1) + "%</span>"; }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

  /* ===== Excel 导出（SpreadsheetML，Excel/WPS 可直接打开，带颜色+自动筛选+冻结表头） ===== */
  function xCell(v, style, type) {
    return '<Cell' + (style ? ' ss:StyleID="' + style + '"' : "") + '><Data ss:Type="' + (type || "String") + '">' + (type === "Number" ? v : esc(v)) + "</Data></Cell>";
  }
  /* 元 → 万元，精确到元不四舍五入（去掉末尾多余的 0） */
  function wanE(v) {
    var s = (v / 10000).toFixed(6);
    return s.indexOf(".") >= 0 ? s.replace(/0+$/, "").replace(/\.$/, "") : s;
  }
  function buildXls(d) {
    var t = d.totals || {};
    var timeProg = d.daysInMonth ? (d.daysElapsed / d.daysInMonth * 100) : 0;
    var stores = (d.stores || []).filter(notHQ);
    var losses = (d.lossStores || []).filter(notHQ);
    var mgr = {};
    stores.forEach(function (s) { mgr[s.code] = s.storeManager || ""; });
    var kname = function (s) { return (s.code ? String(s.code).toUpperCase() + "-" : "") + (s.name || ""); };
    var below = stores.filter(function (s) { return s.yesterdayRate != null && s.yesterdayRate < 100; }).length;
    var lossTotal = losses.reduce(function (a, s) { return a + (s.lossGap || 0); }, 0);

    var HEADS = ["门店", "编码", "区域", "店长", "昨日(万)", "昨日指标(万)", "日完成率", "月营收", "月完成率", "环比上周同日", "环比上周同日批次", "环比上周同日批单", "周环比", "平衡点(万)", "预计利润(万)", "利润指标对比(万)", "预警"];
    var WIDTHS = [170, 55, 55, 55, 75, 75, 60, 80, 65, 80, 85, 85, 65, 75, 80, 80, 55];
    var LHEADS = ["门店", "区域", "店长", "月累计(万)", "预计月末(万)", "盈亏平衡(万)", "缺口(万)"];

    var rows = [];
    /* 标题 + 营业日 */
    rows.push("<Row>" + xCell("直营门店经营日报", "sTitle") + "</Row>");
    rows.push("<Row>" + xCell("营业日 " + d.date + " · 共 " + stores.length + " 家门店", "sLbl") + "</Row>");
    rows.push("<Row></Row>");
    /* 全国汇总（左右两栏排布） */
    var sumPairs = [
      ["昨日完成（万元）", xCell(wanE(t.yesterdayRevenue), "sNumB", "Number"), "月累计（万元）", xCell(wanE(t.mtdRevenue), "sNumB", "Number")],
      ["昨日指标（万元）", xCell(wanE(t.yesterdayTarget), "sNum", "Number"), "月度目标（万元）", xCell(wanE(t.monthBudget), "sNum", "Number")],
      ["昨日完成率", t.yesterdayRate == null ? xCell("—") : xCell(t.yesterdayRate.toFixed(1), t.yesterdayRate < 100 ? "sPctR" : "sPctG2", "Number"),
       "月度完成率", t.progress == null ? xCell("—") : xCell(t.progress.toFixed(1), t.progress < timeProg ? "sPctR" : "sPctG2", "Number")],
      ["未完成门店", xCell(below + " 家", below > 0 ? "sRed" : null), "序时进度", xCell(timeProg.toFixed(1) + "%（" + d.daysElapsed + "/" + d.daysInMonth + " 天）")]
    ];
    sumPairs.forEach(function (r) {
      rows.push("<Row>" + xCell(r[0], "sLbl") + r[1] + xCell(r[2], "sLbl") + r[3] + "</Row>");
    });
    rows.push("<Row></Row>");
    /* 预计亏损门店 */
    rows.push("<Row>" + xCell("预计亏损门店（共 " + losses.length + " 家 · 合计缺口 " + wanE(lossTotal) + " 万）", "sSecR") + "</Row>");
    rows.push("<Row>" + LHEADS.map(function (h) { return xCell(h, "sHead"); }).join("") + "</Row>");
    losses.forEach(function (s) {
      rows.push("<Row>" + xCell(kname(s)) + xCell(s.region || "", "sGray") + xCell(mgr[s.code] || "", "sGray") +
        xCell(wanE(s.mtdRevenue), "sNum", "Number") +
        xCell(wanE(s.forecastMonth), "sNum", "Number") +
        (s.breakEven == null ? xCell("—") : xCell(s.breakEven, "sNum", "Number")) +
        xCell(wanE(s.lossGap), "sRedN", "Number") + "</Row>");
    });
    if (!losses.length) rows.push("<Row>" + xCell("暂无预计亏损门店", "sGreen") + "</Row>");
    rows.push("<Row></Row>");
    /* 门店明细（按昨日完成率升序，最差的在最前；无数据沉底） */
    var sorted = stores.slice().sort(function (a, b) {
      if (a.yesterdayRate == null && b.yesterdayRate == null) return 0;
      if (a.yesterdayRate == null) return 1;
      if (b.yesterdayRate == null) return -1;
      return a.yesterdayRate - b.yesterdayRate;
    });
    rows.push("<Row>" + xCell("门店明细（共 " + stores.length + " 家 · 按昨日完成率升序）", "sSec") + "</Row>");
    var detailHdrRow = rows.length + 1;
    rows.push("<Row>" + HEADS.map(function (h) { return xCell(h, "sHead"); }).join("") + "</Row>");
    sorted.forEach(function (s) {
      rows.push("<Row>" + xCell(kname(s)) + xCell(s.code, "sGray") + xCell(s.region, "sGray") + xCell(s.storeManager || "", "sGray") +
        xCell(wanE(s.yesterdayRevenue), "sNum", "Number") +
        xCell(wanE(s.yesterdayTarget), "sNum", "Number") +
        (s.yesterdayRate == null ? xCell("—") : xCell(s.yesterdayRate.toFixed(1), s.yesterdayRate < 100 ? "sPctR" : "sPctG2", "Number")) +
        xCell(wanE(s.mtdRevenue), "sNum", "Number") +
        (s.mtdRate == null ? xCell("—") : xCell(s.mtdRate.toFixed(1), s.mtdRate < timeProg ? "sPctR" : "sPctG2", "Number")) +
        (s.wowSameDay == null ? xCell("—") : xCell(s.wowSameDay.toFixed(1), s.wowSameDay < 0 ? "sPctR" : "sPctG", "Number")) +
        (s.wowBatchSameDay == null ? xCell("—") : xCell(s.wowBatchSameDay.toFixed(1), s.wowBatchSameDay < 0 ? "sPctR" : "sPctG", "Number")) +
        (s.wowPerBatchSameDay == null ? xCell("—") : xCell(s.wowPerBatchSameDay.toFixed(1), s.wowPerBatchSameDay < 0 ? "sPctR" : "sPctG", "Number")) +
        (s.wowWeek == null ? xCell("—") : xCell(s.wowWeek.toFixed(1), s.wowWeek < 0 ? "sPctR" : "sPctG", "Number")) +
        (s.breakEven == null ? xCell("—") : xCell(s.breakEven, "sNum", "Number")) +
        (s.breakEven == null ? xCell("—") : (function () { var p = s.forecastMonth - s.breakEven * 10000; return xCell(wanE(p), p < 0 ? "sRedN" : "sGrnN", "Number"); })()) +
        ((s.breakEven == null || s.profitBudget == null) ? xCell("—") : (function () { var p = s.forecastMonth - s.breakEven * 10000 - s.profitBudget * 10000; return xCell(wanE(p), p < 0 ? "sRedN" : "sGrnN", "Number"); })()) +
        (s.lossRisk ? xCell("● 亏损", "sRed") : xCell("—")) + "</Row>");
    });
    var detailEndRow = rows.length;

    return '<?xml version="1.0" encoding="UTF-8"?>\n<?mso-application progid="Excel.Sheet"?>\n' +
      '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet" xmlns:x="urn:schemas-microsoft-com:office:excel">' +
      "<Styles>" +
      '<Style ss:ID="Default" ss:Name="Normal"><Font ss:FontName="Microsoft YaHei" ss:Size="10"/></Style>' +
      '<Style ss:ID="sHead"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Bold="1"/><Interior ss:Color="#F2F2F2" ss:Pattern="Solid"/><Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1"/></Borders></Style>' +
      '<Style ss:ID="sTitle"><Font ss:FontName="Microsoft YaHei" ss:Size="14" ss:Bold="1"/></Style>' +
      '<Style ss:ID="sSec"><Font ss:FontName="Microsoft YaHei" ss:Size="11" ss:Bold="1"/></Style>' +
      '<Style ss:ID="sSecR"><Font ss:FontName="Microsoft YaHei" ss:Size="11" ss:Bold="1" ss:Color="#D1242F"/></Style>' +
      '<Style ss:ID="sLbl"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Color="#666666"/></Style>' +
      '<Style ss:ID="sGray"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Color="#999999"/></Style>' +
      '<Style ss:ID="sNum"><NumberFormat ss:Format="General"/></Style>' +
      '<Style ss:ID="sNumB"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Bold="1"/><NumberFormat ss:Format="General"/></Style>' +
      '<Style ss:ID="sPct"><NumberFormat ss:Format="0.0&quot;%&quot;"/></Style>' +
      '<Style ss:ID="sPctR"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Color="#D1242F"/><NumberFormat ss:Format="0.0&quot;%&quot;"/></Style>' +
      '<Style ss:ID="sPctG"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Color="#1A7F37"/><NumberFormat ss:Format="+0.0&quot;%&quot;;-0.0&quot;%&quot;"/></Style>' +
      '<Style ss:ID="sPctG2"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Color="#1A7F37"/><NumberFormat ss:Format="0.0&quot;%&quot;"/></Style>' +
      '<Style ss:ID="sRed"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Color="#D1242F"/></Style>' +
      '<Style ss:ID="sRedN"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Color="#D1242F"/><NumberFormat ss:Format="General"/></Style>' +
      '<Style ss:ID="sGrnN"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Color="#1A7F37"/><NumberFormat ss:Format="General"/></Style>' +
      '<Style ss:ID="sGreen"><Font ss:FontName="Microsoft YaHei" ss:Size="10" ss:Color="#1A7F37"/></Style>' +
      "</Styles>" +
      '<Worksheet ss:Name="直营日报"><Table>' +
      WIDTHS.map(function (w) { return '<Column ss:Width="' + w + '"/>'; }).join("") +
      rows.join("") + "</Table>" +
      '<AutoFilter x:Range="R' + detailHdrRow + "C1:R" + detailEndRow + 'C' + HEADS.length + '" xmlns="urn:schemas-microsoft-com:office:excel"/>' +
      "</Worksheet>" +
      "</Workbook>";
  }
  function downloadXls() {
    if (!current || current.isSample) return;
    try {
      var xml = buildXls(current);
      var blob = new Blob(["﻿" + xml], { type: "application/vnd.ms-excel" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "直营门店日报_" + current.date + ".xls";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
    } catch (e) { /* ignore */ }
  }

  function render(d) {
    current = d;
    var t = d.totals || {};
    $('[data-f="bizdate"]').textContent = "营业日 " + d.date;
    $('[data-f="meta"]').textContent = (d.isSample ? "示例数据 · " : "") + "共 " + (d.stores || []).filter(notHQ).length + " 家门店";
    $('[data-f="yRev"]').textContent = fmtWan(t.yesterdayRevenue);
    $('[data-f="yTgt"]').textContent = "指标 " + fmtWan(t.yesterdayTarget) + " 万";
    var yr = $('[data-f="yRate"]');
    yr.textContent = fmtPct(t.yesterdayRate);
    yr.classList.toggle("bad", t.yesterdayRate != null && t.yesterdayRate < 100);
    yr.classList.toggle("pos", t.yesterdayRate != null && t.yesterdayRate >= 100);
    var below = (d.stores || []).filter(notHQ).filter(function (s) { return s.yesterdayRate != null && s.yesterdayRate < 100; }).length;
    var ys = $('[data-f="yStores"]');
    ys.textContent = below + " 家未达标";
    ys.classList.toggle("bad", below > 0);
    $('[data-f="mRev"]').textContent = fmtWan(t.mtdRevenue);
    $('[data-f="mTgt"]').textContent = "月度目标 " + fmtWan(t.monthBudget) + " 万";
    var timeProg = d.daysInMonth ? (d.daysElapsed / d.daysInMonth * 100) : 0;
    var mr = $('[data-f="mRate"]');
    mr.textContent = fmtPct(t.progress);
    mr.classList.toggle("pos", t.progress != null && t.progress >= timeProg);
    mr.classList.toggle("neg", t.progress != null && t.progress < timeProg);
    $('[data-f="pTime"]').textContent = "序时进度 " + timeProg.toFixed(1) + "%（" + d.daysElapsed + "/" + d.daysInMonth + " 天）";
    renderLossPanel(d);
    renderTools(d);
    renderTable(d);
    $('[data-f="footer"]').textContent = "口径：主控台·营收分析表（T+1 日结）｜指标：" + d.month + " 月度指标表（每月更新）｜盈亏平衡为月度值，区间取中值｜预计亏损 = 当前日均 × 当月天数 低于盈亏平衡点";
  }

  function renderLossPanel(d) {
    var list = (d.lossStores || []).filter(notHQ);
    var grid = $('[data-f="lossGrid"]');
    if (!list.length) {
      $('[data-f="lossSum"]').textContent = "";
      grid.innerHTML = '<div class="lp-ok">暂无预计亏损门店</div>';
      return;
    }
    var mgr = {};
    (d.stores || []).forEach(function (s) { mgr[s.code] = s.storeManager || ""; });
    var total = list.reduce(function (a, s) { return a + (s.lossGap || 0); }, 0);
    $('[data-f="lossSum"]').textContent = "共 " + list.length + " 家 · 合计缺口 " + fmtWan(total) + " 万";
    grid.innerHTML = list.map(function (s) {
      var who = esc(s.region || "") + (mgr[s.code] ? " · " + esc(mgr[s.code]) : "");
      return '<div class="lp-item">' +
        '<div class="r1"><span class="nm">' + (s.code ? '<span class="cd">' + esc(String(s.code).toUpperCase()) + "-</span>" : "") + esc(s.name) + '</span><span class="gap">缺口 ' + fmtWan(s.lossGap) + ' 万</span></div>' +
        '<div class="sub">预计月末 ' + fmtWan(s.forecastMonth) + ' 万 / 盈亏平衡 ' + (s.breakEven == null ? "—" : s.breakEven) + ' 万</div>' +
        '<div class="sub lt">' + who + '</div>' +
        '</div>';
    }).join("");
  }

  var toolsWired = false;
  function renderTools(d) {
    var sel = $('[data-f="regionSel"]');
    var stores = (d.stores || []).filter(notHQ);
    var visRegions = {};
    stores.forEach(function (s) { if (s.region) visRegions[s.region] = 1; });
    var regions = (d.regions || []).map(function (r) { return r.name; }).filter(function (rn) { return visRegions[rn]; });
    var opts = '<option value="">全部区域</option>' + regions.map(function (r) {
      return '<option value="' + esc(r) + '"' + (r === state.region ? " selected" : "") + ">" + esc(r) + "</option>";
    }).join("");
    sel.innerHTML = opts;

    var nUndone = stores.filter(function (s) { return s.yesterdayRate != null && s.yesterdayRate < 100; }).length;
    var nDone = stores.filter(function (s) { return s.yesterdayRate != null && s.yesterdayRate >= 100; }).length;
    var labels = { undone: "当日未完成 " + nUndone, done: "当日已完成 " + nDone, all: "全部 " + stores.length };
    Array.prototype.forEach.call($('[data-f="segDone"]').children, function (btn) {
      btn.textContent = labels[btn.dataset.v];
      btn.classList.toggle("on", btn.dataset.v === state.doneFilter);
    });

    if (!toolsWired) {
      toolsWired = true;
      sel.addEventListener("change", function () { state.region = sel.value; saveState(); renderTable(current); });
      var inp = $('[data-f="searchInput"]');
      inp.addEventListener("input", function () { state.q = inp.value.trim(); saveState(); renderTable(current); });
      Array.prototype.forEach.call($('[data-f="segDone"]').children, function (btn) {
        btn.addEventListener("click", function () {
          state.doneFilter = btn.dataset.v;
          if (state.doneFilter === "undone") { state.sortKey = "yesterdayRate"; state.sortAsc = true; }
          else if (state.doneFilter === "done") { state.sortKey = "yesterdayRate"; state.sortAsc = false; }
          saveState();
          renderTools(current);
          renderTable(current);
        });
      });
      var dl = $('[data-f="dlBtn"]');
      if (dl) dl.addEventListener("click", downloadXls);
    }
  }

  function renderTable(d) {
    var tr = $('[data-f="theadRow"]');
    tr.innerHTML = COLS.map(function (c, i) {
      var arrow = state.sortKey === c.key ? (state.sortAsc ? " ▲" : " ▼") : "";
      var sorted = state.sortKey === c.key ? ' class="sorted"' : "";
      return '<th scope="col" tabindex="0" data-col="' + i + '"' + sorted + '>' + c.label + arrow + "</th>";
    }).join("");
    Array.prototype.forEach.call(tr.children, function (th) {
      th.addEventListener("click", function () { toggleSort(COLS[+th.dataset.col].key); });
      th.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleSort(COLS[+th.dataset.col].key); } });
    });

    var rows = (d.stores || []).filter(notHQ).filter(function (s) {
      if (state.doneFilter === "undone" && !(s.yesterdayRate != null && s.yesterdayRate < 100)) return false;
      if (state.doneFilter === "done" && !(s.yesterdayRate != null && s.yesterdayRate >= 100)) return false;
      if (state.region && s.region !== state.region) return false;
      if (state.q) {
        var q = state.q.toLowerCase();
        if (s.name.toLowerCase().indexOf(q) < 0 && s.code.toLowerCase().indexOf(q) < 0) return false;
      }
      return true;
    });
    rows.sort(function (a, b) {
      var k = state.sortKey, va = a[k], vb = b[k];
      if (k === "lossRisk") { va = a.lossRisk ? a.lossGap : -1; vb = b.lossRisk ? b.lossGap : -1; }
      if (k === "forecastProfit") {
        va = a.breakEven == null ? null : a.forecastMonth / 10000 - a.breakEven;
        vb = b.breakEven == null ? null : b.forecastMonth / 10000 - b.breakEven;
      }
      if (k === "profitDiff") {
        va = (a.breakEven == null || a.profitBudget == null) ? null : a.forecastMonth / 10000 - a.breakEven - a.profitBudget;
        vb = (b.breakEven == null || b.profitBudget == null) ? null : b.forecastMonth / 10000 - b.breakEven - b.profitBudget;
      }
      if (k === "name") { va = a.name; vb = b.name; }
      /* 无数据（—）的行始终排在最后 */
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      var cmp = (typeof va === "string") ? String(va).localeCompare(String(vb), "zh-CN") : (va - vb);
      return state.sortAsc ? cmp : -cmp;
    });

    var html = rows.map(function (s) {
      var yCls = s.yesterdayRate == null ? "" : (s.yesterdayRate < 100 ? "bad" : "pos");
      var tProg = d.daysInMonth ? (d.daysElapsed / d.daysInMonth * 100) : 0;
      var mCls = s.mtdRate == null ? "" : (s.mtdRate < tProg ? "bad" : "pos");
      return '<tr' + (s.lossRisk ? ' class="risk"' : "") + ">" +
        '<td><span class="cell-name"><span class="nm">' + (s.code ? '<span class="cd">' + esc(String(s.code).toUpperCase()) + "-</span>" : "") + esc(s.name) + '</span><span class="rg">' + esc(s.region) + (s.storeManager ? " · " + esc(s.storeManager) : "") + "</span></span></td>" +
        "<td>" + fmtWan(s.yesterdayRevenue) + "</td>" +
        "<td>" + fmtWan(s.yesterdayTarget) + "</td>" +
        '<td><span class="' + yCls + '">' + fmtPct(s.yesterdayRate) + "</span></td>" +
        "<td>" + fmtWan(s.mtdRevenue) + "</td>" +
        '<td><span class="' + mCls + '">' + fmtPct(s.mtdRate) + "</span></td>" +
        "<td>" + fmtWow(s.wowSameDay) + "</td>" +
        "<td>" + fmtWow(s.wowBatchSameDay) + "</td>" +
        "<td>" + fmtWow(s.wowPerBatchSameDay) + "</td>" +
        "<td>" + fmtWow(s.wowWeek) + "</td>" +
        "<td>" + (s.breakEven == null ? '<span class="muted">—</span>' : s.breakEven) + "</td>" +
        "<td>" + (s.breakEven == null ? '<span class="muted">—</span>' : (function () { var p = s.forecastMonth / 10000 - s.breakEven; return '<span class="' + (p < 0 ? "neg" : "pos") + '">' + (p > 0 ? "+" : "") + p.toFixed(2) + "</span>"; })()) + "</td>" +
        "<td>" + ((s.breakEven == null || s.profitBudget == null) ? '<span class="muted">—</span>' : (function () { var p = s.forecastMonth / 10000 - s.breakEven - s.profitBudget; return '<span class="' + (p < 0 ? "neg" : "pos") + '">' + (p > 0 ? "+" : "") + p.toFixed(2) + "</span>"; })()) + "</td>" +
        "<td>" + (s.lossRisk ? '<span class="warn-dot">● 亏损</span>' : '<span class="muted">—</span>') + "</td>" +
        "</tr>";
    }).join("");
    $('[data-f="tbody"]').innerHTML = html || '<tr><td colspan="14" class="muted">无匹配门店</td></tr>';

    var note = $('[data-f="tblNote"]');
    if (note) {
      note.textContent = "共 " + rows.length + " 家";
    }
  }

  function toggleSort(key) {
    if (state.sortKey === key) state.sortAsc = !state.sortAsc;
    else { state.sortKey = key; state.sortAsc = (key === "name"); }
    saveState();
    renderTable(current);
  }

  function saveState() {
    try {
      if (window.DaimonCanvas && typeof window.DaimonCanvas.setViewState === "function") {
        var vs = window.DaimonCanvas.viewState || {};
        window.DaimonCanvas.setViewState(Object.assign({}, vs, { sortKey: state.sortKey, sortAsc: state.sortAsc, region: state.region, q: state.q, doneFilter: state.doneFilter }));
      }
    } catch (e) { /* ignore */ }
  }
  function restoreState() {
    try {
      if (window.DaimonCanvas && window.DaimonCanvas.viewState) {
        var vs = window.DaimonCanvas.viewState;
        if (vs.sortKey) state.sortKey = vs.sortKey;
        if (typeof vs.sortAsc === "boolean") state.sortAsc = vs.sortAsc;
        if (vs.region) state.region = vs.region;
        if (vs.q) { state.q = vs.q; var inp = $('[data-f="searchInput"]'); if (inp) inp.value = vs.q; }
        if (vs.doneFilter) state.doneFilter = vs.doneFilter;
      }
    } catch (e) { /* ignore */ }
  }

  function syncRefreshBtn() {
    var rb = $('[data-f="refreshBtn"]');
    if (!rb) return;
    var st = (window.DaimonWidget && window.DaimonWidget.status) || "";
    var running = String(st).indexOf("run") >= 0 || String(st).indexOf("load") >= 0;
    rb.disabled = running;
    rb.textContent = running ? "更新中…" : "更新数据";
  }

  function boot() {
    restoreState();
    var host = window.DaimonWidget;
    var rb = $('[data-f="refreshBtn"]');
    if (rb) {
      rb.addEventListener("click", function () {
        try {
          if (window.DaimonWidget && typeof window.DaimonWidget.emit === "function") {
            window.DaimonWidget.emit("submit", {});
            rb.disabled = true;
            rb.textContent = "更新中…";
          }
        } catch (e) { /* ignore */ }
      });
    }
    if (host && typeof host.onStatusChange === "function") {
      host.onStatusChange(function () { syncRefreshBtn(); });
    }
    syncRefreshBtn();
    if (host && typeof host.onDataChange === "function") {
      host.onDataChange(function (data) {
        var main = data && data.main;
        if (main && main.totals && main.stores && main.stores.length) render(main);
        else render(SAMPLE);
        syncRefreshBtn();
      });
    } else {
      render(SAMPLE);
    }
  }

  if (document && typeof document.querySelector === "function" && document.querySelector("[data-kimi-root]")) {
    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
    else boot();
  }
})();
</script>
</body>
</html>
