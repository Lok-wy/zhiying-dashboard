<style>
  :root{
    --bg:#f7f3ec;            /* 米白 */
    --panel:#fffdf8;
    --ink:#3d352c;
    --ink-2:#7a6f5f;
    --line:#e8e0d2;
    --gold:#b08a3e;          /* 金棕主色 */
    --gold-deep:#8f6c2c;
    --silver:#9aa0a6;
    --bronze:#a9714b;
    --red:#c14b3a;
    --red-tint:#fbecea;
    --green:#5d8a5a;
    --muted:#b9b0a0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:var(--bg);
    color:var(--ink);
    font-size:13px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{display:flex;flex-direction:column;height:100vh;padding:10px 12px 12px;}
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:0 1px 2px rgba(90,70,40,.05);
  }

  /* ── 摘要条 ── */
  .summary{
    padding:12px 14px;
    margin-bottom:10px;
    flex:none;
  }
  .summary-head{
    display:flex;align-items:baseline;justify-content:space-between;
    flex-wrap:wrap;gap:4px 10px;margin-bottom:10px;
  }
  .summary-title{font-size:15px;font-weight:600;letter-spacing:.5px;color:var(--gold-deep);}
  .summary-meta{font-size:11px;color:var(--ink-2);display:flex;gap:12px;flex-wrap:wrap;}
  .summary-meta b{color:var(--ink);font-weight:600;}
  .stat-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;
  }
  .stat{
    background:#faf6ee;border:1px solid var(--line);border-radius:8px;
    padding:7px 10px;min-width:0;
  }
  .stat .label{font-size:11px;color:var(--ink-2);white-space:nowrap;}
  .stat .value{font-size:17px;font-weight:700;margin-top:1px;white-space:nowrap;}
  .stat .sub{font-size:11px;color:var(--ink-2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stat.bad .value{color:var(--red);}
  .badge-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:1px;}

  /* ── 表格 ── */
  .table-panel{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  .table-scroll{flex:1;overflow:auto;min-height:0;border-radius:0 0 10px 10px;}
  table{border-collapse:collapse;width:100%;min-width:640px;}
  thead th{
    position:sticky;top:0;z-index:2;
    background:#efe7d8;color:var(--ink-2);
    font-size:12px;font-weight:600;text-align:left;
    padding:8px 10px;border-bottom:1px solid var(--line);
    white-space:nowrap;cursor:pointer;user-select:none;
  }
  thead th .sort-mark{margin-left:3px;font-size:10px;color:var(--gold);}
  thead th.nosort{cursor:default;}
  tbody td{
    padding:7px 10px;font-size:12.5px;border-bottom:1px solid #f0e9dc;
    vertical-align:top;white-space:nowrap;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.row-bad{background:var(--red-tint);}
  tbody tr.row-nograde{opacity:.48;}
  tbody tr:hover td{background:#faf4e8;}
  tbody tr.row-bad:hover td{background:#f7e4de;}

  .store-name{font-weight:600;color:#3d352c;white-space:normal;overflow-wrap:break-word;}
  .store-sub{font-size:11px;color:var(--ink-2);}
  .grade-badge{
    display:inline-block;padding:1px 7px;border-radius:9px;
    font-size:11px;font-weight:600;color:#fff;
  }
  .grade-gold{background:var(--gold);}
  .grade-silver{background:var(--silver);}
  .grade-bronze{background:var(--bronze);}
  .grade-none{background:#ddd5c7;color:var(--ink-2);font-weight:400;}
  .score{font-size:15px;font-weight:700;}
  .arrow-up{color:var(--green);}
  .arrow-down{color:var(--red);}
  .arrow-flat{color:var(--muted);}
  .fluct{font-size:11px;margin-left:2px;}
  .fluct.up{color:var(--green);}
  .fluct.down{color:var(--red);}
  .star{color:#c99327;font-weight:600;}
  .cell-sub{font-size:11px;color:var(--ink-2);}
  .bad-num{font-weight:700;}
  .bad-num.pos{color:var(--red);}
  .mom-pct{font-weight:600;}
  .dash{color:var(--muted);}

  /* ── 工具栏(区域筛选/店名搜索) ── */
  .tbl-tools{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    padding:8px 10px;border-bottom:1px solid var(--line);
    background:#faf6ee;border-radius:10px 10px 0 0;
  }
  .tbl-tools select,.tbl-tools input{
    font-family:inherit;font-size:12px;color:var(--ink);
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:4px 8px;height:28px;outline:none;
  }
  .tbl-tools select:focus,.tbl-tools input:focus{border-color:var(--gold);}
  .tbl-tools input{width:170px;}
  .tbl-tools .count{font-size:11px;color:var(--ink-2);margin-left:auto;white-space:nowrap;}

  /* ── 更新数据按钮 ── */
  .refresh-btn{
    font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;
    color:#fff;background:var(--gold);border:1px solid var(--gold-deep);
    border-radius:6px;padding:3px 12px;height:26px;white-space:nowrap;
  }
  .refresh-btn:hover{background:var(--gold-deep);}
  .refresh-btn:disabled{opacity:.55;cursor:default;}

  .demo-tag{
    position:fixed;right:10px;bottom:10px;z-index:10;
    background:rgba(120,100,60,.85);color:#fff;
    font-size:11px;padding:2px 8px;border-radius:9px;
    display:none;letter-spacing:1px;
  }

  @media (max-width:520px){
    body{font-size:12px;}
    .stat .value{font-size:15px;}
    .summary-title{font-size:13.5px;}
    table{min-width:560px;}
    tbody td,thead th{padding:6px 8px;}
  }
</style>
</head>

<script>
(function(){
  'use strict';

  var DASH = '<span class="dash">—</span>';

  /* ---------- 工具 ---------- */
  function esc(s){
    if(s===null||s===undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function num(v){ return (typeof v==='number' && isFinite(v)) ? v : null; }

  /* 昨日/较昨日 箭头：正↑绿 负↓红 0→灰 */
  function fluctMark(v){
    v = num(v);
    if(v===null) return '';
    if(v>0) return '<span class="fluct up">↑'+v+'</span>';
    if(v<0) return '<span class="fluct down">↓'+Math.abs(v)+'</span>';
    return '<span class="fluct" style="color:var(--muted)">→</span>';
  }
  /* 环比箭头：up/down/flat/null */
  function momArrow(m){
    if(m==='up') return '<span class="arrow-up">↗</span>';
    if(m==='down') return '<span class="arrow-down">↘</span>';
    if(m==='flat') return '<span class="arrow-flat">→</span>';
    return '';
  }
  function gradeInfo(g){
    if(g==='金牌') return {cls:'grade-gold', text:'金牌'};
    if(g==='银牌') return {cls:'grade-silver', text:'银牌'};
    if(g==='铜牌') return {cls:'grade-bronze', text:'铜牌'};
    return {cls:'grade-none', text:(g && g!=='暂无等级') ? g : '暂无等级'};
  }
  /* 本月好评环比：(month vs lastMonth) 同口径合计 */
  function momPct(st){
    var m = st.month, lm = st.lastMonth;
    if(!m || !lm) return null;
    var cur = (num(m.mtGood)||0)+(num(m.dpGood)||0);
    var prev = (num(lm.mtGood)||0)+(num(lm.dpGood)||0);
    if(prev===0) return cur>0 ? {pct:null, dir:'up', cur:cur, prev:prev} : {pct:null, dir:'flat', cur:cur, prev:prev};
    var p = (cur-prev)/prev*100;
    return {pct:p, dir:p>0?'up':(p<0?'down':'flat'), cur:cur, prev:prev};
  }

  /* ---------- 列定义 ---------- */
  /* key: 排序用取值函数；render: 单元格 HTML */
  var COLS = [

      render:function(s){

        var subs = [];
        if (s.name && s.branch && s.name!==s.branch) subs.push(s.name);
        var mgr = [];
        if (s.region) mgr.push(s.region);
        if (s.manager) mgr.push(s.manager);
        if (mgr.length) subs.push(mgr.join(' · '));  /* 与直营同款:区域 · 店长 */
        return '<div class="store-name" title="'+esc(s.name||'')+'">'+esc(label)+'</div>'+
               (subs.length?'<div class="store-sub">'+esc(subs.join(' · '))+'</div>':'');
      }},
    {name:'牌级', sortable:true, key:function(s){
        var o={'金牌':3,'银牌':2,'铜牌':1}; return o[s.grade]||0;},
      render:function(s){
        var g=gradeInfo(s.grade);
        return '<span class="grade-badge '+g.cls+'">'+esc(g.text)+'</span>';
      }},
    {name:'经营评分', sortable:true, key:function(s){return num(s.score);}, numeric:true,
      render:function(s){
        var sc=num(s.score);
        if(sc===null) return DASH;
        return '<span class="score">'+sc+'</span> '+fluctMark(s.scoreFluctuate)+' '+momArrow(s.scoreMom);
      }},
    {name:'美团⭐', sortable:true, key:function(s){return num(s.mtStar);}, numeric:true,
      render:function(s){
        var v=num(s.mtStar);
        if(v===null) return DASH;
        return '<span class="star">★ '+v.toFixed(1)+'</span>'+fluctMark(s.mtStarFluctuate);
      }},
    {name:'点评⭐', sortable:true, key:function(s){return num(s.dpStar);}, numeric:true,
      render:function(s){
        var v=num(s.dpStar);
        if(v===null) return DASH;
        return '<span class="star">★ '+v.toFixed(1)+'</span>'+fluctMark(s.dpStarFluctuate);
      }},
    {name:'近7日好评', sortable:true, numeric:true,
      key:function(s){ var y=s.week||s.yesterday; if(!y) return null; return (num(y.mtGood)||0)+(num(y.dpGood)||0);},
      render:function(s){
        var y=s.week||s.yesterday;
        if(!y) return DASH;
        var mt=num(y.mtGood), dp=num(y.dpGood);
        if(mt===null&&dp===null) return DASH;
        return '<div>美团 +'+(mt===null?'—':mt)+'</div>'+
               '<div class="cell-sub">点评 +'+(dp===null?'—':dp)+'</div>';
      }},
    {name:'近7日差评', sortable:true, numeric:true,
      key:function(s){ var y=s.week||s.yesterday; return y? num(y.bad):null;},
      render:function(s){
        var y=s.week||s.yesterday;
        if(!y) return DASH;
        var b=num(y.bad);
        if(b===null) return DASH;
        return '<span class="bad-num'+(b>0?' pos':'')+'">'+b+'</span>';
      }},
    {name:'收藏打卡', sortable:true, numeric:true,
      key:function(s){ var f=s.fav; return f? num(f.day):null;},
      render:function(s){
        var f=s.fav;
        if(!f) return DASH;
        var d=num(f.day), m=num(f.month);
        if(d===null&&m===null) return DASH;
        return '<div>当日 +'+(d===null?'—':d)+'</div>'+
               '<div class="cell-sub">本月 '+(m===null?'—':m)+'</div>';
      }},
    {name:'本月好评环比', sortable:true, numeric:true,
      key:function(s){ var r=momPct(s); if(!r||r.pct===null) return null; return r.pct;},
      render:function(s){
        var r=momPct(s);
        if(!r) return DASH;
        var head;
        if(r.pct===null){
          head = '<span class="mom-pct '+(r.dir==='up'?'arrow-up':'arrow-flat')+'">'+
                 (r.dir==='up'?'新增':'持平')+'</span>';
        }else{
          var cls = r.dir==='up'?'arrow-up':(r.dir==='down'?'arrow-down':'arrow-flat');
          var sign = r.pct>0?'+':'';
          head = '<span class="mom-pct '+cls+'">'+sign+r.pct.toFixed(1)+'%</span>';
        }
        var arr = r.dir==='up'?'↑':(r.dir==='down'?'↓':'→');
        return head+' <span class="'+(r.dir==='up'?'arrow-up':(r.dir==='down'?'arrow-down':'arrow-flat'))+'">'+arr+'</span>'+
               '<div class="cell-sub">'+r.cur+' vs '+r.prev+'</div>';
      }}
  ];

  /* ---------- 排序/筛选状态 ---------- */
  var sortIdx = 2;   /* 默认：经营评分 */
  var sortDir = -1;  /* 默认降序 */
  var filterRegion = '';
  var filterQ = '';
  var currentData = null;

  /* 状态持久化(与看板 placement viewState 同步,刷新后保留筛选) */
  function saveState(){
    try{
      if(window.DaimonCanvas && typeof window.DaimonCanvas.setViewState==='function'){
        var vs = window.DaimonCanvas.viewState || {};
        window.DaimonCanvas.setViewState(Object.assign({}, vs, {
          sortIdx: sortIdx, sortDir: sortDir, region: filterRegion, q: filterQ
        }));
      }
    }catch(e){}
  }
  function restoreState(){
    try{
      if(window.DaimonCanvas && window.DaimonCanvas.viewState){
        var vs = window.DaimonCanvas.viewState;
        if(typeof vs.sortIdx==='number' && vs.sortIdx>=0 && vs.sortIdx<COLS.length) sortIdx=vs.sortIdx;
        if(vs.sortDir===1 || vs.sortDir===-1) sortDir=vs.sortDir;
        if(typeof vs.region==='string') filterRegion=vs.region;
        if(typeof vs.q==='string') filterQ=vs.q;
      }
    }catch(e){}
  }

  function storeMatches(s){
    if(filterRegion && (s.region||'')!==filterRegion) return false;
    if(filterQ){
      var q=filterQ.toLowerCase();
      var hay=((s.name||'')+' '+(s.branch||'')+' '+(s.code||'')+' '+(s.manager||'')).toLowerCase();
      if(hay.indexOf(q)<0) return false;
    }
    return true;
  }

  /* 区域下拉:从当前数据收集区域,保留选中态 */
  function renderTools(d){
    var sel=document.getElementById('regionSel');
    var seen={};
    (d.stores||[]).forEach(function(s){ if(s.region) seen[s.region]=1; });
    var regions=Object.keys(seen).sort(function(a,b){return a.localeCompare(b,'zh-Hans-CN');});
    if(filterRegion && !seen[filterRegion]) filterRegion='';
    sel.innerHTML='<option value="">全部区域</option>'+regions.map(function(r){
      return '<option value="'+esc(r)+'"'+(r===filterRegion?' selected':'')+'>'+esc(r)+'</option>';
    }).join('');
    var inp=document.getElementById('searchInput');
    if(inp.value!==filterQ) inp.value=filterQ;
  }

  function sortStores(stores){
    var col = COLS[sortIdx];
    var arr = stores.slice();
    arr.sort(function(a,b){
      var va=col.key(a), vb=col.key(b);
      if(va===null||va===undefined) va = -Infinity;
      if(vb===null||vb===undefined) vb = -Infinity;
      var cmp;
      if(typeof va==='string'||typeof vb==='string'){
        cmp = String(va).localeCompare(String(vb),'zh-Hans-CN');
      }else{
        cmp = va-vb;
      }
      return cmp*sortDir;
    });
    return arr;
  }

  /* ---------- 渲染 ---------- */
  function renderHead(){
    var tr=document.getElementById('headRow');
    var html='';
    COLS.forEach(function(c,i){
      var mark='';
      if(c.sortable){
        if(i===sortIdx) mark='<span class="sort-mark">'+(sortDir===-1?'▼':'▲')+'</span>';
        else mark='<span class="sort-mark" style="opacity:.3">⇅</span>';
      }
      html+='<th data-i="'+i+'" class="'+(c.sortable?'':'nosort')+'">'+esc(c.name)+mark+'</th>';
    });
    tr.innerHTML=html;
    tr.querySelectorAll('th').forEach(function(th){
      var i=parseInt(th.getAttribute('data-i'),10);
      if(!COLS[i].sortable) return;
      th.addEventListener('click',function(){
        if(i===sortIdx) sortDir=-sortDir;
        else { sortIdx=i; sortDir=(i===0||i===1)?1:-1; }
        saveState();
        renderBody();
        renderHead();
      });
    });
  }

  function renderBody(){
    if(!currentData) return;
    var all=currentData.stores||[];
    var filtered=all.filter(storeMatches);
    var stores = sortStores(filtered);
    var html='';
    stores.forEach(function(s){
      var bad = (s.week||s.yesterday) && num((s.week||s.yesterday).bad);
      var noGrade = !s.grade || s.grade==='暂无等级';
      var cls=[];
      if(bad!==null&&bad>0) cls.push('row-bad');
      if(noGrade) cls.push('row-nograde');
      html+='<tr'+(cls.length?' class="'+cls.join(' ')+'"':'')+'>';
      COLS.forEach(function(c){ html+='<td>'+c.render(s)+'</td>'; });
      html+='</tr>';
    });
    if(!stores.length){
      html='<tr><td colspan="'+COLS.length+'" style="text-align:center;color:var(--muted);padding:24px;">'+
           ((filterRegion||filterQ)?'无匹配门店':'暂无门店数据')+'</td></tr>';
    }
    document.getElementById('bodyRows').innerHTML=html;
    var cnt=document.getElementById('tblCount');
    if(cnt) cnt.textContent=(filterRegion||filterQ)?('筛选 '+stores.length+' / 共 '+all.length+' 家'):('共 '+all.length+' 家');
  }

  function renderSummary(d){
    document.getElementById('m-dataDate').textContent = d.dataDate || '—';
    document.getElementById('m-updatedAt').textContent = d.updatedAt || '—';
    var stores=d.stores||[];
    var gold=0,silver=0,bronze=0,none=0;
    var yMt=0,yDp=0,yBad=0,yMtN=0,yDpN=0,yBadN=0;
    var fDay=0,fDayN=0,fMon=0,fMonN=0;
    stores.forEach(function(s){
      if(s.grade==='金牌') gold++;
      else if(s.grade==='银牌') silver++;
      else if(s.grade==='铜牌') bronze++;
      else none++;
      var y=s.week||s.yesterday;
      if(y){
        var a=num(y.mtGood),b=num(y.dpGood),c=num(y.bad);
        if(a!==null){yMt+=a;yMtN++;}
        if(b!==null){yDp+=b;yDpN++;}
        if(c!==null){yBad+=c;yBadN++;}
      }
      var f=s.fav;
      if(f){
        var fd=num(f.day),fm=num(f.month);
        if(fd!==null){fDay+=fd;fDayN++;}
        if(fm!==null){fMon+=fm;fMonN++;}
      }
    });
    var total = num(d.storeCount)!==null ? d.storeCount : stores.length;
    var grid=document.getElementById('statGrid');
    grid.innerHTML=
      stat('门店总数', total, '当前在营门店')+
      stat('牌级分布',
        '<span class="badge-dot" style="background:var(--gold)"></span>'+gold+'&nbsp;'+
        '<span class="badge-dot" style="background:var(--silver)"></span>'+silver+'&nbsp;'+
        '<span class="badge-dot" style="background:var(--bronze)"></span>'+bronze,
        (none?('暂无等级 '+none+' 家'):'金 / 银 / 铜'))+
      stat('近7日好评 · 美团', yMtN?'+'+yMt:DASH.replace(/<[^>]+>/g,'—'), '美团渠道近7天新增')+
      stat('近7日好评 · 点评', yDpN?'+'+yDp:DASH.replace(/<[^>]+>/g,'—'), '点评渠道近7天新增')+
      statBad('近7日差评', yBadN?yBad:'—', yBad>0?'需跟进处理':'近7天无差评')+
      stat('收藏打卡 · 当日', fDayN?'+'+fDay:'—', '本月累计 '+(fMonN?fMon:'—'));
  }
  function stat(label,value,sub){
    return '<div class="stat"><div class="label">'+esc(label)+'</div>'+
           '<div class="value">'+value+'</div>'+
           '<div class="sub">'+esc(sub)+'</div></div>';
  }
  function statBad(label,value,sub){
    return '<div class="stat bad"><div class="label">'+esc(label)+'</div>'+
           '<div class="value">'+value+'</div>'+
           '<div class="sub">'+esc(sub)+'</div></div>';
  }

  function render(d){
    if(!d || !Array.isArray(d.stores)) return;
    currentData=d;
    renderSummary(d);
    renderTools(d);
    renderHead();
    renderBody();
  }

  /* ---------- 数据注入 ---------- */
  function extractPayload(obj){
    /* 兼容多种注入结构：
       1) 直接 slots.main 数据
       2) {main: {...}} 或 {slots:{main:{...}}}
       3) postMessage {type:'...slot...', data/payload/slots:{...}} */
    if(!obj || typeof obj!=='object') return null;
    if(Array.isArray(obj.stores)) return obj;
    if(obj.main && Array.isArray(obj.main.stores)) return obj.main;
    if(obj.slots && obj.slots.main && Array.isArray(obj.slots.main.stores)) return obj.slots.main;
    if(obj.data && Array.isArray(obj.data.stores)) return obj.data;
    if(obj.payload && Array.isArray(obj.payload.stores)) return obj.payload;
    if(obj.slots && obj.slots.stores && Array.isArray(obj.slots.stores)) return obj.slots;
    return null;
  }

  var injected=false;
  function tryInject(obj){
    if(injected) return;
    var p=extractPayload(obj);
    if(p){
      injected=true;
      document.getElementById('demoTag').style.display='none';
      render(p);
    }
  }

  /* DaimonWidget 运行时:onDataChange 立即提供当前快照并订阅更新 */
  if(window.DaimonWidget && typeof window.DaimonWidget.onDataChange==='function'){
    window.DaimonWidget.onDataChange(function(data){
      if(injected) return;
      tryInject(data);
    });
  }

  /* ---------- 工具栏/按钮事件与状态恢复 ---------- */
  restoreState();
  document.getElementById('regionSel').addEventListener('change',function(){
    filterRegion=this.value; saveState(); renderBody();
  });
  document.getElementById('searchInput').addEventListener('input',function(){
    filterQ=this.value.trim(); saveState(); renderBody();
  });
  var refreshBtn=document.getElementById('refreshBtn');
  function syncRefreshBtn(){
    var st=(window.DaimonWidget && window.DaimonWidget.status) || '';
    var running=String(st).indexOf('run')>=0 || String(st).indexOf('load')>=0;
    refreshBtn.disabled=running;
    refreshBtn.textContent=running?'更新中…':'更新数据';
  }
  refreshBtn.addEventListener('click',function(){
    try{
      if(window.DaimonWidget && typeof window.DaimonWidget.emit==='function'){
        window.DaimonWidget.emit('submit',{});
        refreshBtn.disabled=true;
        refreshBtn.textContent='更新中…';
      }
    }catch(e){}
  });
  if(window.DaimonWidget && typeof window.DaimonWidget.onStatusChange==='function'){
    window.DaimonWidget.onStatusChange(function(){ syncRefreshBtn(); });
  }
  syncRefreshBtn();

  /* ---------- 示例数据 ---------- */
  var DEMO={
    updatedAt:'2026-07-22 20:40',
    dataDate:'2026-07-21',
    storeCount:3,
    stores:[
      {shopId:'131334029',name:'星聚会KTV(金沙印象城店)',branch:'金沙印象城店',region:'杭州区',manager:'张三',grade:'金牌',
       score:91,scoreFluctuate:0,scoreMom:'up',mtStar:4.3,dpStar:4.5,
       mtStarFluctuate:0,dpStarFluctuate:0,mtStarMom:null,dpStarMom:null,
       fav:{day:6,month:120},
       yesterday:{mtGood:5,dpGood:3,bad:0},
       month:{mtGood:38,dpGood:18,bad:2},
       lastMonth:{mtGood:30,dpGood:20,bad:1}},
      {shopId:'208811776',name:'星聚会KTV(城西银泰店)',branch:'城西银泰店',region:'杭州区',manager:'李四',grade:'银牌',
       score:84,scoreFluctuate:-2,scoreMom:'down',mtStar:4.1,dpStar:4.2,
       mtStarFluctuate:-0.1,dpStarFluctuate:0,mtStarMom:'down',dpStarMom:'flat',
       fav:{day:2,month:58},
       yesterday:{mtGood:2,dpGood:1,bad:3},
       month:{mtGood:25,dpGood:12,bad:4},
       lastMonth:{mtGood:28,dpGood:15,bad:3}},
      {shopId:'190055432',name:'星聚会KTV(滨江宝龙城店)',branch:'滨江宝龙城店',region:'杭州区',manager:'王五',grade:'暂无等级',
       score:76,scoreFluctuate:1,scoreMom:null,mtStar:null,dpStar:3.9,
       mtStarFluctuate:null,dpStarFluctuate:0.1,mtStarMom:null,dpStarMom:'up',
       fav:{day:0,month:12},
       yesterday:{mtGood:1,dpGood:2,bad:0},
       month:{mtGood:10,dpGood:9,bad:1},
       lastMonth:{mtGood:12,dpGood:8,bad:0}}
    ]
  };

  /* 仅在无 DaimonWidget 运行时(独立浏览器预览)显示示例数据 */
  if(!(window.DaimonWidget && typeof window.DaimonWidget.onDataChange==='function')){
    document.getElementById('demoTag').style.display='block';
    render(DEMO);
  }
})();
</script>
